syntax = "proto3";
package aerozen.msgs;

option java_package = "com.aerozen.msgs";
option java_outer_classname = "StatisticProtos";

import "aerozen/proto/header.proto";

/**
 * @ingroup aerozen.msgs
 * @interface Statistic
 * @brief A message that contains statistics data.
 */
message Statistic
{
  //  The type of data represented by this statistic.
  enum DataType
  {
    // The data type has not been initialized.
    UNINITIALIZED    = 0;
    // An average value is represented.
    AVERAGE          = 1;
    //  A minimum value is represented.
    MINIMUM          = 2;
    // A maximum value is represented.
    MAXIMUM          = 3;
    // A variance is represented.
    VARIANCE         = 4;
    // A standard deviation is represented.
    STDDEV           = 5;
    // A sample count is represented.
    SAMPLE_COUNT     = 6;
    // A root mean square value is represented.
    ROOT_MEAN_SQUARE = 7;
    //  A maximum absolute value is represented.
    MAX_ABS_VALUE    = 8;
  }

  // Optional header data
  Header header  = 1;

  // The data type.
  DataType type  = 2;

  // Name associated with the statistic.
  string   name  = 3;

  // The statistic's value.
  double   value = 4;
}

//  A named group of statistics.
message StatisticsGroup
{
  // Optional header data.
  Header header                 = 1;

  // Name of the group.
  string name                   = 2;

  // Statistics the belong to this group.
  repeated Statistic statistics = 3;
}

message Metric
{
  // Optional header data
  Header header  = 1;

  // Unit of measurement such as seconds, meters, liters.
  string   unit  = 2;

  // Zero or more named groups of statistics. A statistic group is
  // used to bundle data into a logical set with an associated name.
  repeated StatisticsGroup statistics_groups = 3;

  // Zero or more statistics.
  repeated Statistic statistics          = 4;
}
